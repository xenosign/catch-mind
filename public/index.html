<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>캐치마인드</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 닉네임 입력 화면 -->
  <div id="join-overlay" class="overlay">
    <form id="join-form" class="join-box">
      <h1>캐치마인드</h1>
      <input id="nickname-input" type="text" maxlength="20" placeholder="닉네임을 입력하세요" autocomplete="off" required />
      <button type="submit">입장하기</button>
    </form>
  </div>

  <div id="game" class="game hidden">
    <header class="topbar">
      <div class="topbar-left">
        <span id="player-count">0명 접속</span>
        <span id="drawer-info">대기 중...</span>
        <button type="button" id="start-btn" class="hidden">게임 시작</button>
      </div>
      <div class="topbar-center">
        <span class="word-box">
          <span class="word-label">문제:</span>
          <span id="word-hint"></span>
        </span>
        <span id="timer"></span>
      </div>
      <div class="topbar-right"></div>
    </header>

    <main class="main">
      <section class="canvas-area">
        <div id="toolbar" class="toolbar hidden">
          <div class="colors">
            <!-- 흑/백 -->
            <button type="button" class="color-btn" data-color="#000000" style="background:#000000"></button>
            <button type="button" class="color-btn" data-color="#ffffff" style="background:#ffffff"></button>
            <!-- 빨강 -->
            <button type="button" class="color-btn" data-color="#a60000" style="background:#a60000"></button>
            <button type="button" class="color-btn" data-color="#ff0000" style="background:#ff0000"></button>
            <button type="button" class="color-btn" data-color="#ff5959" style="background:#ff5959"></button>
            <!-- 주황 -->
            <button type="button" class="color-btn" data-color="#a66b00" style="background:#a66b00"></button>
            <button type="button" class="color-btn" data-color="#ffa500" style="background:#ffa500"></button>
            <button type="button" class="color-btn" data-color="#ffc559" style="background:#ffc559"></button>
            <!-- 노랑 -->
            <button type="button" class="color-btn" data-color="#a6a600" style="background:#a6a600"></button>
            <button type="button" class="color-btn" data-color="#ffff00" style="background:#ffff00"></button>
            <button type="button" class="color-btn" data-color="#ffff59" style="background:#ffff59"></button>
            <!-- 초록 -->
            <button type="button" class="color-btn" data-color="#005300" style="background:#005300"></button>
            <button type="button" class="color-btn" data-color="#008000" style="background:#008000"></button>
            <button type="button" class="color-btn" data-color="#59ac59" style="background:#59ac59"></button>
            <button type="button" class="color-btn" data-color="#bef264" style="background:#bef264"></button>
            <!-- 파랑 -->
            <button type="button" class="color-btn" data-color="#0000a6" style="background:#0000a6"></button>
            <button type="button" class="color-btn" data-color="#0000ff" style="background:#0000ff"></button>
            <button type="button" class="color-btn" data-color="#5959ff" style="background:#5959ff"></button>
            <!-- 남색 -->
            <button type="button" class="color-btn" data-color="#000053" style="background:#000053"></button>
            <button type="button" class="color-btn" data-color="#000080" style="background:#000080"></button>
            <button type="button" class="color-btn" data-color="#5959ac" style="background:#5959ac"></button>
            <!-- 보라 -->
            <button type="button" class="color-btn" data-color="#530053" style="background:#530053"></button>
            <button type="button" class="color-btn" data-color="#800080" style="background:#800080"></button>
            <button type="button" class="color-btn" data-color="#ac59ac" style="background:#ac59ac"></button>
          </div>
          <div class="sizes">
            <button type="button" class="size-btn" data-size="2">얇게</button>
            <button type="button" class="size-btn" data-size="6">보통</button>
            <button type="button" class="size-btn" data-size="14">굵게</button>
          </div>
          <button type="button" id="skip-btn">패스</button>
          <button type="button" id="clear-btn">전체 지우기</button>
        </div>
        <div class="canvas-wrap">
          <canvas id="canvas" width="800" height="600"></canvas>
          <div id="correct-overlay" class="correct-overlay hidden"></div>
        </div>
      </section>

      <aside class="sidebar">
        <h2>참가자 (<span id="sidebar-count">0</span>)</h2>
        <ol id="player-list" class="player-list"></ol>
      </aside>
    </main>

    <footer class="chat-area">
      <div id="chat-log" class="chat-log"></div>
      <form id="guess-form" class="guess-form">
        <input id="guess-input" type="text" placeholder="정답을 입력하세요" autocomplete="off" />
        <button type="submit">전송</button>
      </form>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
